<svg width="880" height="310" viewBox="0 0 880 310" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mateo@sonzogni — desarrollador full stack">
  <style>
    .mono { font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, 'SF Mono', monospace; }
    .dim    { fill: #52525b; }
    .soft   { fill: #a1a1aa; }
    .bright { fill: #f4f4f5; }
    .accent { fill: #fb2c5c; }
    .line { opacity: 0; animation: reveal 0.01s linear forwards; }
    .l1 { animation-delay: 0.5s; }
    .l2 { animation-delay: 1.3s; }
    .l3 { animation-delay: 1.7s; }
    .l4 { animation-delay: 2.6s; }
    .l5 { animation-delay: 3.4s; }
    .l6 { animation-delay: 4.0s; }
    @keyframes reveal { to { opacity: 1; } }
    .cursor { animation: blink 1.1s steps(1) infinite; animation-delay: 4.0s; opacity: 0; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>

  <!-- window -->
  <rect x="1" y="1" width="878" height="308" rx="14" fill="#0b0b0f" stroke="#26262e" stroke-width="1"/>

  <!-- title bar -->
  <path d="M1 15 Q1 1 15 1 H865 Q879 1 879 15 V42 H1 Z" fill="#111116"/>
  <line x1="1" y1="42" x2="879" y2="42" stroke="#26262e" stroke-width="1"/>
  <circle cx="27" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="21" r="6" fill="#febc2e"/>
  <circle cx="69" cy="21" r="6" fill="#28c840"/>
  <text x="440" y="26" text-anchor="middle" class="mono dim" font-size="13">mateo@sonzogni — ~/estudio</text>

  <!-- terminal body -->
  <text x="36" y="88" class="mono bright line l1" font-size="15"><tspan class="accent">➜</tspan><tspan class="dim" dx="10">~</tspan><tspan dx="10">whoami</tspan></text>

  <text x="36" y="138" class="mono bright line l2" font-size="36" font-weight="700" letter-spacing="1">Mateo Sonzogni</text>
  <text x="36" y="168" class="mono soft line l3" font-size="16">desarrollador full stack — corazón en el front-end</text>

  <text x="36" y="216" class="mono bright line l4" font-size="15"><tspan class="accent">➜</tspan><tspan class="dim" dx="10">~</tspan><tspan dx="10">stack --favoritos</tspan></text>
  <text x="36" y="246" class="mono soft line l5" font-size="15">vue · gsap · webgl · three.js · lenis · laravel · node · fastapi</text>

  <text x="36" y="284" class="mono bright line l6" font-size="15"><tspan class="accent">➜</tspan><tspan class="dim" dx="10">~</tspan><tspan class="accent cursor" dx="10">▍</tspan></text>
</svg>
